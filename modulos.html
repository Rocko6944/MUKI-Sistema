<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modulos | Mukialom Sistema</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="sistema.css">
  <link rel="icon" type="image/png" href="Images/logoSinFondo.png">
</head>
<body class="modulos-body" data-requires-auth="true">
  <header class="topbar">
    <div class="topbar__left">
      <a href="modulos.html" class="topbar__logo">
        <img src="Images/logoSinFondo.png" alt="Mukialom">
      </a>
    </div>

    <div class="topbar__right">
      <button class="topbar__icon" aria-label="Configuracion" title="Configuracion" data-nav="settings" type="button">
        <img src="Images/iconoConfiguraciones.png" alt="Configuracion">
      </button>
      <button class="topbar__icon topbar__icon--bell" aria-label="Notificaciones" title="Notificaciones" data-nav="notifications" type="button">
        <img src="Images/IconoNotificaciones.png" alt="Notificaciones">
        <span class="topbar__badge">3</span>
      </button>
      <button class="topbar__icon topbar__icon--user" aria-label="Perfil" title="Perfil" id="topbar-user-btn" type="button" aria-expanded="false">
        <img src="Images/IconoUsuario.png" alt="Perfil">
      </button>
      <div class="topbar-user-card hidden" id="topbar-user-card">
        <div class="topbar-user-card__header">
          <strong id="topbar-user-name">Usuario</strong>
          <span id="topbar-user-role">Rol</span>
        </div>
        <div class="topbar-user-card__body">
          <p><span>Usuario:</span><strong id="topbar-user-username">-</strong></p>
          <p><span>Estado:</span><strong>Sesion activa</strong></p>
          <p><span>Acceso:</span><strong>Web interna</strong></p>
        </div>
      </div>
    </div>
  </header>

  <main class="modulos-main">
    <div class="modulos-grid">
      <section class="modulo-card">
        <h2 class="modulo-card__title">VENTAS</h2>
        <div class="modulo-card__icon">
          <img src="Images/iconoVentas.png" alt="Ventas">
        </div>
        <a href="ventas.html" class="modulo-card__btn">Ingresar</a>
      </section>

      <section class="modulo-card">
        <h2 class="modulo-card__title">OPERACIONES</h2>
        <div class="modulo-card__icon">
          <img src="Images/iconoOperaciones.png" alt="Operaciones">
        </div>
        <a href="operaciones.html" class="modulo-card__btn">Ingresar</a>
      </section>

      <section class="modulo-card">
        <h2 class="modulo-card__title">ADMINISTRACION</h2>
        <div class="modulo-card__icon">
          <img src="Images/iconoAdministracion.png" alt="Administracion">
        </div>
        <a href="administracion.html" class="modulo-card__btn">Ingresar</a>
      </section>

      <section class="modulo-card">
        <h2 class="modulo-card__title">CLIENTES</h2>
        <div class="modulo-card__icon">
          <img src="Images/IconoClientes.png" alt="Clientes">
        </div>
        <a href="clientes.html" class="modulo-card__btn">Ingresar</a>
      </section>
    </div>
  </main>

  <script src="auth.js"></script>
</body>
</html>
